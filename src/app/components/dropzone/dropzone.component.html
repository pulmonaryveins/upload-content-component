<div
  class="dropzone"
  [class.dropzone--active]="isDragging()"
  (dragenter)="onDragEnter($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="openFileBrowser()"
  role="button"
  aria-label="Drop files here or click to browse"
>
  <div class="dropzone__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </div>
  <p class="dropzone__label">Drop files here or click to browse</p>
  <div class="dropzone__types">
    <span class="dropzone__type-badge">PNG</span>
    <span class="dropzone__type-badge">JPEG</span>
    <span class="dropzone__type-badge">JPG</span>
    <span class="dropzone__type-badge">MP4</span>
    <span class="dropzone__type-badge">WEBM</span>
  </div>
</div>

<input
  #fileInput
  type="file"
  class="hidden"
  multiple
  accept=".png,.jpeg,.jpg,.mp4,.webm,image/png,image/jpeg,video/mp4,video/webm"
  (change)="onFileInputChange($event)"
/>
