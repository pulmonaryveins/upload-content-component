<!-- Tab bar -->
<div class="dropzone-tabs">
  <button
    class="dropzone-tabs__tab"
    [class.dropzone-tabs__tab--active]="activeTab() === 'computer'"
    (click)="setTab('computer')"
    type="button"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Computer
  </button>
  <button
    class="dropzone-tabs__tab"
    [class.dropzone-tabs__tab--active]="activeTab() === 'drive'"
    (click)="setTab('drive')"
    type="button"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 87.3 78"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H.01c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L.98 49.55c-.8 1.4-1.2 2.95-1.2 4.5h27.49z" fill="#00ac47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 10.9z" fill="#ea4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="M59.8 57.05H27.49L13.74 80.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.4 4.5-1.2z" fill="#2684fc"/><path d="M73.4 26.5l-12.8-22.2c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25l16.15 27.95h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>
    Google Drive
  </button>
</div>

<!-- Computer tab -->
@if (activeTab() === 'computer') {
  <div
    class="dropzone"
    [class.dropzone--active]="isDragging()"
    (dragenter)="onDragEnter($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="openFileBrowser()"
    role="button"
    aria-label="Drop files here or click to browse"
  >
    <div class="dropzone__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <p class="dropzone__label">Drop files here or click to browse</p>
    <div class="dropzone__types">
      <span class="dropzone__type-badge">PNG</span>
      <span class="dropzone__type-badge">JPEG</span>
      <span class="dropzone__type-badge">JPG</span>
      <span class="dropzone__type-badge">MP4</span>
      <span class="dropzone__type-badge">WEBM</span>
    </div>
  </div>
}

<!-- Google Drive tab -->
@if (activeTab() === 'drive') {
  <div class="dropzone dropzone--drive">
    <svg class="dropzone__drive-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 87.3 78" width="52" height="46">
      <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H.01c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
      <path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L.98 49.55c-.8 1.4-1.2 2.95-1.2 4.5h27.49z" fill="#00ac47"/>
      <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 10.9z" fill="#ea4335"/>
      <path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
      <path d="M59.8 57.05H27.49L13.74 80.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.4 4.5-1.2z" fill="#2684fc"/>
      <path d="M73.4 26.5l-12.8-22.2c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25l16.15 27.95h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
    </svg>
    <p class="dropzone__label">Browse your Google Drive</p>
    <p class="dropzone__drive-sub">Images and videos only &mdash; PNG, JPEG, MP4, WEBM</p>
    <button
      class="dropzone__drive-btn"
      (click)="openDrivePicker()"
      [disabled]="isDriveLoading()"
      type="button"
    >
      @if (isDriveLoading()) {
        <svg class="dropzone__drive-spinner" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Connecting&hellip;
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 87.3 78"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H.01c0 1.55.4 3.1 1.2 4.5z" fill="#fff" opacity=".9"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L.98 49.55c-.8 1.4-1.2 2.95-1.2 4.5h27.49z" fill="#fff" opacity=".9"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 10.9z" fill="#fff" opacity=".9"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#fff" opacity=".7"/><path d="M59.8 57.05H27.49L13.74 80.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.4 4.5-1.2z" fill="#fff" opacity=".9"/><path d="M73.4 26.5l-12.8-22.2c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25l16.15 27.95h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#fff" opacity=".8"/></svg>
        Open Google Drive
      }
    </button>
    @if (driveError()) {
      <p class="dropzone__drive-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ driveError() }}
      </p>
    }
  </div>
}

<input
  #fileInput
  type="file"
  class="hidden"
  multiple
  accept=".png,.jpeg,.jpg,.mp4,.webm,image/png,image/jpeg,video/mp4,video/webm"
  (change)="onFileInputChange($event)"
/>
